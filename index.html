<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>접힌 글 출력 메이커 · 수정본</title>
<style>
  :root{
    --bg:#ffffff; --line:#eff3f4; --text:#0f1419; --sub:#536471; --blue:#1d9bf0; --hover:#f7f9f9;
    --panel:#f8fafc; --panelLine:#dde6ee; --btn:#0f1419; --danger:#e5484d; --left:270px; --right:390px; --max:1560px;
    --active:#e8f3ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif}
  body{overflow-x:auto}
  button,input,textarea,select{font:inherit}
  .app{width:max(1320px,min(100%,var(--max)));margin:0 auto;display:grid;grid-template-columns:var(--left) minmax(620px,1fr) var(--right);min-height:100vh}
  .app.panel-collapsed{grid-template-columns:var(--left) minmax(820px,1fr) 56px}
  .left{border-right:1px solid var(--line);padding:12px 14px 20px;background:#fff;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{width:48px;height:48px;border-radius:999px;display:grid;place-items:center;font-size:24px;font-weight:700;margin-bottom:10px}
  .all-filter{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:999px;border:0;background:transparent;cursor:pointer;font-size:16px;font-weight:800;color:#0f1419;width:100%;text-align:left}
  .all-filter:hover{background:var(--hover)}
  .all-filter.active{background:var(--active);color:#0b63ce}
  .char-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .char-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:16px}
  .char-item:hover{background:var(--hover)}
  .char-item.active{background:var(--active)}
  .char-filter{border:0;background:transparent;cursor:pointer;width:36px;height:36px;border-radius:999px;display:grid;place-items:center;flex:0 0 36px}
  .char-filter:hover{background:#edf5ff}
  .char-icon{font-size:18px}
  .char-name{width:100%;border:1px solid transparent;background:transparent;border-radius:12px;padding:10px 12px;font-size:16px;font-weight:800;color:#0f1419;outline:none}
  .char-name:hover{background:#f8fafc;border-color:#edf2f6}
  .char-name:focus{background:#fff;border-color:#91c7ff;box-shadow:0 0 0 3px rgba(29,155,240,.12)}
  .icon-btn{border:0;background:transparent;color:#7b8b98;cursor:pointer;width:30px;height:30px;border-radius:999px;flex:0 0 30px;display:grid;place-items:center;font-size:16px}
  .icon-btn:hover{background:#eef3f7;color:#213547}
  .add-char{width:100%;border:1px dashed #c9d6e1;background:#f9fbfd;color:#26435d;padding:12px 14px;border-radius:14px;font-weight:800;cursor:pointer;margin-top:10px}
  .add-char:hover{background:#f1f7fc}
  .post-btn{margin-top:16px;width:100%;border:0;border-radius:999px;background:var(--btn);color:#fff;font-size:18px;font-weight:800;padding:15px 16px;cursor:pointer}
  .center{border-right:1px solid var(--line);background:#fff;min-width:0}
  .app.panel-collapsed .center{border-right:0}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line);padding:14px 18px;font-size:20px;font-weight:900}
  .timeline{padding-bottom:30px}
  .tweet{border-bottom:1px solid var(--line);padding:14px 18px 12px;cursor:pointer;transition:background .15s ease}
  .tweet:hover{background:var(--hover)}
  .tweet-row{display:flex;gap:12px;align-items:flex-start}
  .avatar{width:42px;height:42px;border-radius:999px;flex:0 0 42px;background:linear-gradient(135deg,#e9efff,#e8dfff 50%,#f5ebff);border:1px solid #e5e7f5;display:grid;place-items:center;font-size:20px}
  .tweet-main{flex:1;min-width:0}
  .tweet-head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
  .name{font-weight:900}
  .id,.time,.category-chip{color:var(--sub)}
  .category-chip{font-size:12px;border:1px solid #dbe7f5;padding:2px 8px;border-radius:999px;background:#f8fbff}
  .tweet-title{font-size:17px;line-height:1.5;font-weight:700;white-space:pre-wrap;word-break:keep-all}
  .tweet-top-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
  .fold-indicator{color:var(--sub);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
  .chev{display:inline-block;transition:transform .2s ease}
  .tweet.open .chev{transform:rotate(180deg)}
  .delete-post-btn{border:0;background:#fff1f2;color:var(--danger);padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800;cursor:pointer}
  .delete-post-btn:hover{background:#ffe4e6}
  .tweet-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;max-width:470px;color:var(--sub);font-size:14px}
  .action{display:flex;align-items:center;gap:6px}
  .fold{display:none;margin-top:12px;border:1px solid #dbe7f5;background:#fff;border-radius:18px;overflow:hidden}
  .tweet.open .fold{display:block}
  .fold-html{padding:16px;background:#fff;line-height:1.6;overflow:auto}
  .fold-html img{max-width:100%;height:auto}
  .empty-state{padding:40px 24px;text-align:center;color:var(--sub);font-size:15px}
  .right{background:var(--panel);padding:16px;position:sticky;top:0;height:100vh;overflow:auto}
  .app.panel-collapsed .right{padding:12px 8px}
  .editor{background:#fff;border:1px solid var(--panelLine);border-radius:22px;padding:16px;box-shadow:0 8px 24px rgba(15,20,25,.06)}
  .app.panel-collapsed .editor{display:none}
  .editor h2{margin:0 0 14px;font-size:22px}
  .section-title{margin:16px 0 10px;padding-top:14px;border-top:1px solid #edf1f4;font-size:14px;font-weight:900;color:#294156}
  .group{margin-bottom:14px}
  .group label{display:block;margin-bottom:6px;font-size:13px;font-weight:800;color:#415668}
  .field,.area,.select{width:100%;border:1px solid #d7e0e8;background:#fff;border-radius:14px;padding:12px 13px;outline:none}
  .field:focus,.area:focus,.select:focus{border-color:#8ec6ff;box-shadow:0 0 0 3px rgba(29,155,240,.12)}
  .area{min-height:300px;resize:vertical;line-height:1.55}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .btn{border:0;border-radius:14px;padding:12px 14px;font-weight:800;cursor:pointer}
  .btn.primary{background:#0f1419;color:#fff}
  .btn.sub{background:#eef4f8;color:#183145}
  .mini{margin-top:12px;padding-top:12px;border-top:1px solid #edf1f4;color:#5d6e7d;font-size:13px;line-height:1.65}
  .collapse-wrap{display:none}
  .app.panel-collapsed .collapse-wrap{display:block}
  .collapse-btn{width:100%;height:100%;border:0;border-radius:18px;background:#fff;box-shadow:0 8px 24px rgba(15,20,25,.06);cursor:pointer;font-weight:900;color:#294156}
  .panel-toggle{width:100%;border:0;border-radius:14px;background:#eef4f8;color:#183145;padding:10px 12px;font-weight:800;cursor:pointer;margin-bottom:12px}
  .hidden-file-input{display:none}
  @media (max-width:1150px){.app{grid-template-columns:230px minmax(560px,1fr) 340px}.app.panel-collapsed{grid-template-columns:230px minmax(700px,1fr) 56px}}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="left">
    <div class="brand">⌂</div>
    <button class="all-filter active" id="allFilterBtn" type="button">전체</button>
    <div class="char-list" id="charList"></div>
    <button class="add-char" id="addCharBtn" type="button">+ 캐릭터 추가</button>
    <button class="post-btn" id="focusEditorBtn" type="button">게시하기</button>
  </aside>

  <main class="center">
    <div class="topbar" id="topbarTitle">프로필 · 전체</div>
    <section class="timeline" id="timeline"></section>
  </main>

  <aside class="right">
    <div class="collapse-wrap">
      <button class="collapse-btn" id="expandPanelBtn" type="button">≪</button>
    </div>
    <div class="editor">
      <button class="panel-toggle" id="collapsePanelBtn" type="button">입력창 접기</button>
      <h2>입력창</h2>

      <div class="section-title">게시글 정보</div>
      <div class="group">
        <label for="categorySelect">카테고리</label>
        <select class="select" id="categorySelect"></select>
      </div>

      <div class="row2">
        <div class="group">
          <label for="authorName">작성자 이름</label>
          <input class="field" id="authorName" placeholder="비워도 됨">
        </div>
        <div class="group">
          <label for="timeText">시간</label>
          <input class="field" id="timeText" placeholder="비워도 됨">
        </div>
      </div>

      <div class="group">
        <label for="userId">아이디</label>
        <input class="field" id="userId" value="@AERRCEHAM_12">
      </div>

      <div class="section-title">게시글 작성</div>
      <div class="group">
        <label for="titleText">게시글 작성</label>
        <input class="field" id="titleText" value="말도안되는 걸로 밸런스게임하는 두 사람 !출력">
      </div>

      <div class="group">
        <label for="htmlText">접힌 글 안에 들어갈 HTML</label>
        <textarea class="area" id="htmlText"></textarea>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="addBtn" type="button">글 추가</button>
        <button class="btn sub" id="sampleBtn" type="button">샘플 넣기</button>
      </div>

      <div class="btn-row">
        <button class="btn sub" id="saveBtn" type="button">HTML 저장</button>
        <button class="btn sub" id="loadBtn" type="button">HTML 불러오기</button>
      </div>

      <div class="btn-row">
        <button class="btn sub" id="resetBtn" type="button">입력 초기화</button>
        <button class="btn sub" type="button" disabled style="opacity:.45;cursor:default;"> </button>
      </div>

      <input type="file" id="loadFileInput" class="hidden-file-input" accept=".html,text/html">
    </div>
  </aside>
</div>

<script>
const app = document.getElementById('app');
const timeline = document.getElementById('timeline');
const charList = document.getElementById('charList');
const allFilterBtn = document.getElementById('allFilterBtn');
const topbarTitle = document.getElementById('topbarTitle');
const categorySelect = document.getElementById('categorySelect');
const authorName = document.getElementById('authorName');
const userId = document.getElementById('userId');
const timeText = document.getElementById('timeText');
const titleText = document.getElementById('titleText');
const htmlText = document.getElementById('htmlText');
const addBtn = document.getElementById('addBtn');
const sampleBtn = document.getElementById('sampleBtn');
const saveBtn = document.getElementById('saveBtn');
const loadBtn = document.getElementById('loadBtn');
const loadFileInput = document.getElementById('loadFileInput');
const resetBtn = document.getElementById('resetBtn');
const focusEditorBtn = document.getElementById('focusEditorBtn');
const addCharBtn = document.getElementById('addCharBtn');
const collapsePanelBtn = document.getElementById('collapsePanelBtn');
const expandPanelBtn = document.getElementById('expandPanelBtn');

const defaultHtml = `<div style="background: linear-gradient(135deg, #1f1c2c, #3a3456); border-radius: 20px; padding: 30px; font-family: 'Malgun Gothic', sans-serif; color: #e0e0e0; border: 2px solid #5c548c; box-shadow: 0 8px 25px rgba(0,0,0,0.5);">
    <h1 style="text-align: center; color: #a989d4; font-size: 18pt; letter-spacing: 2px; text-shadow: 0 0 10px #a989d4; border-bottom: 2px dashed #7a6a9b; padding-bottom: 15px; margin-bottom: 25px;">
        ⚠️ S급 커플의 고장 난 밸런스 게임 ⚠️
    </h1>
    <p style="text-align: center; font-style: italic; color: #b0b0b0; margin-bottom: 30px;">"세상에서 제일 쓸데없는 고민, 지금 시작합니다."</p>
    <div style="background-color: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 20px; margin-bottom: 25px;">
        <h2 style="color: #f7c5a8; margin-top: 0; font-size: 14pt;">ROUND 1. 아크식 생존 게임</h2>
        <div style="display: flex; justify-content: space-around; align-items: center; margin-top: 20px;">
            <div style="text-align: center; width: 45%;">
                <strong style="color: #ffdcb3; font-size: 11pt;">블루의 선택: 닥터 밴스 잔소리</strong>
                <p style="font-size: 9pt; line-height: 1.6; margin-top: 10px;">"일단... 생존이 우선이잖아요. 밴스 박사님 잔소리는 익숙해지면 BGM처럼 들릴지도 모르죠. 하지만 해일 군주님 훈련은... 아내님을 못 보고 죽을 수도 있어요. 전 과부 만들 생각 없습니다."</p>
            </div>
            <div style="font-size: 24pt; color: #a989d4;">VS</div>
            <div style="text-align: center; width: 45%;">
                <strong style="color: #c5a8f7; font-size: 11pt;">모르포의 선택: 해일 밑에서 훈련</strong>
                <p style="font-size: 9pt; line-height: 1.6; margin-top: 10px;">"닥터 밴스의 잔소리는 내 영혼을 좀먹는다고! 차라리 몸이 힘든 게 나아. 그리고 S급 가이드가 그 정도 훈련에 죽을 것 같아? 내 파트너가 옆에 있는데. 잔소리로 스트레스받아서 가이딩 퀄리티가 떨어지는 것보단 이게 낫지!"</p>
            </div>
        </div>
    </div>
    <div style="background-color: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 20px; margin-bottom: 25px;">
        <h2 style="color: #a8dff7; margin-top: 0; font-size: 14pt;">ROUND 2. 사랑의 시간 역행</h2>
        <div style="display: flex; justify-content: space-around; align-items: center; margin-top: 20px;">
            <div style="text-align: center; width: 45%;">
                <strong style="color: #ffdcb3; font-size: 11pt;">블루의 선택: 10살 어려진 모르포</strong>
                <p style="font-size: 9pt; line-height: 1.6; margin-top: 10px;">"18살의 선배님이라... 제가 업어 키워야겠네요. 세상 모든 위험에서 지켜주면서, 저만 보도록 만드는 거죠. 완벽한 사육 아닌가요? 생각만 해도 즐거운데요. 남들한테는 철벽 치고, 제 앞에서만 웃는 모습을 보고 싶어요."</p>
            </div>
            <div style="font-size: 24pt; color: #a989d4;">VS</div>
            <div style="text-align: center; width: 45%;">
                <strong style="color: #c5a8f7; font-size: 11pt;">모르포의 선택: 10살 많아진 블루</strong>
                <p style="font-size: 9pt; line-height: 1.6; margin-top: 10px;">"38살의 윤재안? 완전 섹시할 것 같은데? 지금도 저렇게 능글맞은데 10년 연륜이 더 쌓이면... 어우. 내가 맨날 기댈 수 있는 진짜 어른 남편이잖아. 주름도 멋있을 거고, 목소리는 더 낮아지겠지? 난 완전 찬성!"</p>
            </div>
        </div>
    </div>
    <div style="background-color: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 20px;">
        <h2 style="color: #f7a8a8; margin-top: 0; font-size: 14pt;">FINAL ROUND. 능력의 현타</h2>
        <div style="display: flex; justify-content: space-around; align-items: center; margin-top: 20px;">
            <div style="text-align: center; width: 45%;">
                <strong style="color: #ffdcb3; font-size: 11pt;">블루의 선택: 능력으로 모기 잡기</strong>
                <p style="font-size: 9pt; line-height: 1.6; margin-top: 10px;">"아내님 주무시는데 방해되는 모든 해충은 제가 박멸하겠습니다. S급 능력으로 초정밀 타격해서 흔적도 없이 증발시키는 거죠. 얼마나 영광스러운 임무입니까. 당신의 꿀잠을 위해서라면, 제 능력은 모기채가 되어도 좋습니다."</p>
            </div>
            <div style="font-size: 24pt; color: #a989d4;">VS</div>
            <div style="text-align: center; width: 45%;">
                <strong style="color: #c5a8f7; font-size: 11pt;">모르포의 선택: 능력으로 화분에 물 주기</strong>
                <p style="font-size: 9pt; line-height: 1.6; margin-top: 10px;">"우리 집에 식물 하나 키우자! 내 가이딩 파장으로 물을 줘서 키우면 얼마나 잘 자라겠어. 매일 아침 '우리 아가 잘 잤니?' 하면서 가이딩으로 물 주는 거야. 얼마나 평화롭고 사랑스러워. S급 가이드가 키운 상추, 맛도 끝내줄걸?"</p>
            </div>
        </div>
    </div>
    <div style="border-top: 2px dashed #7a6a9b; padding-top: 20px; margin-top: 30px; text-align: center;">
        <h3 style="margin-top: 0; color: #e0e0e0; font-size: 12pt;"><strong>게임 결과: 무승부</strong></h3>
        <p style="color: #b0b0b0; font-size: 10pt;">두 사람은 어떤 상황에서도 서로와 함께하는 미래를 그리고 있다는 결론에 도달하며, 결국 이 게임은 서로를 향한 애정 자랑 대회가 되었다고 한다.</p>
    </div>
</div>`;

function initialState(){
  return {
    charSeq: 3,
    characters: [
      {id:'char1', name:'캐릭터 1'},
      {id:'char2', name:'캐릭터 2'},
      {id:'char3', name:'캐릭터 3'}
    ],
    posts: [
      {categoryId:'char1', categoryName:'캐릭터 1', author:'', userId:'@AERRCEHAM_12', time:'', title:'말도안되는 걸로 밸런스게임하는 두 사람 !출력', html:defaultHtml}
    ]
  };
}

let {charSeq, characters, posts} = initialState();
let activeCategoryId = 'all';
htmlText.value = defaultHtml;

function escapeHtml(text){
  return String(text ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}
function validCharacters(){ return characters.filter(c => String(c.name).trim()); }
function getCategoryNameById(id){
  const found = characters.find(c => c.id === id);
  return found ? String(found.name).trim() : '';
}
function ensureActiveCategory(){
  if(activeCategoryId === 'all') return;
  if(!characters.some(c => c.id === activeCategoryId && String(c.name).trim())) activeCategoryId = 'all';
}
function renderCategorySelect(){
  const valid = validCharacters();
  const current = valid.some(c => c.id === categorySelect.value) ? categorySelect.value : (valid[0] ? valid[0].id : '');
  categorySelect.innerHTML = valid.length ? valid.map(c => `<option value="${escapeHtml(c.id)}">${escapeHtml(c.name)}</option>`).join('') : '<option value="">캐릭터 없음</option>';
  categorySelect.value = valid.some(c => c.id === current) ? current : (valid[0] ? valid[0].id : '');
}
function buildHead(post){
  const parts = [];
  if(post.author && post.author.trim()) parts.push(`<span class="name">${escapeHtml(post.author)}</span>`);
  if(post.userId && post.userId.trim()) parts.push(`<span class="id">${escapeHtml(post.userId)}</span>`);
  if(post.time && post.time.trim()) parts.push(`<span class="time">· ${escapeHtml(post.time)}</span>`);
  return parts.join('');
}
function renderCharacters(){
  ensureActiveCategory();
  allFilterBtn.classList.toggle('active', activeCategoryId === 'all');
  charList.innerHTML = characters.map(char => `
    <div class="char-item ${activeCategoryId !== 'all' && char.id === activeCategoryId ? 'active' : ''}">
      <button class="char-filter" type="button" data-filter-id="${escapeHtml(char.id)}" title="필터"><span class="char-icon">✦</span></button>
      <input class="char-name" value="${escapeHtml(char.name)}" data-id="${escapeHtml(char.id)}">
      <button class="icon-btn" type="button" data-del-char="${escapeHtml(char.id)}" title="삭제">×</button>
    </div>
  `).join('');

  charList.querySelectorAll('.char-name').forEach(input => {
    let composing = false;
    input.addEventListener('compositionstart', () => composing = true);
    input.addEventListener('compositionend', () => { composing = false; syncCharName(input); });
    input.addEventListener('input', () => { if(!composing) syncCharName(input); });
    input.addEventListener('blur', () => syncCharName(input));
  });
  charList.querySelectorAll('[data-filter-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategoryId = btn.dataset.filterId;
      renderCharacters();
      renderPosts();
      categorySelect.value = activeCategoryId;
    });
  });
  charList.querySelectorAll('[data-del-char]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.delChar;
      characters = characters.filter(c => c.id !== id);
      posts = posts.filter(p => p.categoryId !== id);
      renderCategorySelect();
      renderCharacters();
      renderPosts();
    });
  });
}
function syncCharName(input){
  const char = characters.find(c => c.id === input.dataset.id);
  if(char) char.name = input.value;
  renderCategorySelect();
  renderPosts();
}
function getFilteredPosts(){
  return activeCategoryId === 'all' ? posts : posts.filter(p => p.categoryId === activeCategoryId);
}
function renderPosts(){
  ensureActiveCategory();
  const activeName = activeCategoryId === 'all' ? '전체' : (getCategoryNameById(activeCategoryId) || '전체');
  topbarTitle.textContent = `프로필 · ${activeName}`;
  const filtered = getFilteredPosts();
  if(!filtered.length){
    timeline.innerHTML = '<div class="empty-state">표시할 글이 없습니다.</div>';
    return;
  }
  timeline.innerHTML = filtered.map((post, idx) => {
    const originalIndex = posts.indexOf(post);
    return `
      <article class="tweet ${idx === 0 ? 'open' : ''}">
        <div class="tweet-row">
          <div class="avatar">🫧</div>
          <div class="tweet-main">
            <div class="tweet-head">
              ${buildHead(post)}
              <span class="category-chip">${escapeHtml(getCategoryNameById(post.categoryId) || post.categoryName)}</span>
              <div class="tweet-top-actions">
                <button class="delete-post-btn" type="button" data-delete-post="${originalIndex}">삭제</button>
                <span class="fold-indicator">접힌 글 보기 <span class="chev">⌄</span></span>
              </div>
            </div>
            <div class="tweet-title">${escapeHtml(post.title)}</div>
            <div class="fold"><div class="fold-html">${post.html}</div></div>
            <div class="tweet-actions">
              <div class="action">💬 <span>0</span></div>
              <div class="action">🔁 <span>0</span></div>
              <div class="action">♡ <span>0</span></div>
              <div class="action">📊 <span>0</span></div>
              <div class="action">🔖</div>
            </div>
          </div>
        </div>
      </article>`;
  }).join('');

  timeline.querySelectorAll('.tweet').forEach(tweet => {
    tweet.addEventListener('click', e => {
      if (e.target.closest('button')) return;
      tweet.classList.toggle('open');
    });
  });
  timeline.querySelectorAll('[data-delete-post]').forEach(btn => {
    btn.addEventListener('click', () => {
      posts.splice(Number(btn.dataset.deletePost), 1);
      renderPosts();
    });
  });
}

function makeExportHtml(){
  const payload = {version:1, charSeq, characters, posts};
  const dataJson = JSON.stringify(payload).replace(/</g,'\\u003c').replace(/>/g,'\\u003e').replace(/&/g,'\\u0026');
  const closeScript = '</' + 'script>';
  const valid = validCharacters();
  const charMarkup = valid.map(char => `
    <div class="char-item">
      <button class="char-filter" type="button" data-export-filter="${escapeHtml(char.id)}" data-export-name="${escapeHtml(char.name)}"><span class="char-icon">✦</span></button>
      <span class="char-name">${escapeHtml(char.name)}</span>
    </div>`).join('');
  const postsMarkup = posts.length ? posts.map(post => `
    <article class="tweet" data-category-id="${escapeHtml(post.categoryId)}">
      <div class="tweet-row">
        <div class="avatar">🫧</div>
        <div class="tweet-main">
          <div class="tweet-head">
            ${buildHead(post)}
            <span class="category-chip">${escapeHtml(getCategoryNameById(post.categoryId) || post.categoryName)}</span>
            <span class="fold-indicator">접힌 글 보기 <span class="chev">⌄</span></span>
          </div>
          <div class="tweet-title">${escapeHtml(post.title)}</div>
          <div class="fold"><div class="fold-html">${post.html}</div></div>
          <div class="tweet-actions">
            <div class="action">💬 <span>0</span></div>
            <div class="action">🔁 <span>0</span></div>
            <div class="action">♡ <span>0</span></div>
            <div class="action">📊 <span>0</span></div>
            <div class="action">🔖</div>
          </div>
        </div>
      </div>
    </article>`).join('') + '<div class="empty-state" id="exportEmptyState" style="display:none;">표시할 글이 없습니다.</div>' : '<div class="empty-state" id="exportEmptyState">아직 글이 없습니다.</div>';

  return `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>folded-output-export</title>
<style>
  :root{--bg:#ffffff;--line:#eff3f4;--text:#0f1419;--sub:#536471;--blue:#1d9bf0;--hover:#f7f9f9;--left:270px;--active:#e8f3ff}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif}
  body{overflow-x:auto}
  button{font:inherit}
  .app{width:min(100%,1200px);margin:0 auto;display:grid;grid-template-columns:var(--left) minmax(620px,1fr);min-height:100vh}
  .left{border-right:1px solid var(--line);padding:12px 14px 20px;background:#fff}
  .brand{width:48px;height:48px;border-radius:999px;display:grid;place-items:center;font-size:24px;font-weight:700;margin-bottom:10px}
  .all-filter{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:999px;border:0;background:transparent;cursor:pointer;font-size:16px;font-weight:800;color:#0f1419;width:100%;text-align:left}
  .all-filter.active{background:var(--active);color:#0b63ce}
  .char-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .char-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:16px}
  .char-item.active{background:var(--active)}
  .char-filter{border:0;background:transparent;cursor:pointer;width:36px;height:36px;border-radius:999px;display:grid;place-items:center;flex:0 0 36px}
  .char-icon{font-size:18px}
  .char-name{display:block;width:100%;padding:10px 12px;font-size:16px;font-weight:800;color:#0f1419}
  .center{background:#fff;min-width:0}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line);padding:14px 18px;font-size:20px;font-weight:900}
  .timeline{padding-bottom:30px}
  .tweet{border-bottom:1px solid var(--line);padding:14px 18px 12px;cursor:pointer;transition:background .15s ease}
  .tweet:hover{background:var(--hover)}
  .tweet-row{display:flex;gap:12px;align-items:flex-start}
  .avatar{width:42px;height:42px;border-radius:999px;flex:0 0 42px;background:linear-gradient(135deg,#e9efff,#e8dfff 50%,#f5ebff);border:1px solid #e5e7f5;display:grid;place-items:center;font-size:20px}
  .tweet-main{flex:1;min-width:0}
  .tweet-head{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
  .name{font-weight:900}
  .id,.time,.category-chip{color:var(--sub)}
  .category-chip{font-size:12px;border:1px solid #dbe7f5;padding:2px 8px;border-radius:999px;background:#f8fbff}
  .fold-indicator{margin-left:auto;color:var(--sub);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
  .chev{display:inline-block;transition:transform .2s ease}
  .tweet.open .chev{transform:rotate(180deg)}
  .tweet-title{font-size:17px;line-height:1.5;font-weight:700;white-space:pre-wrap;word-break:keep-all}
  .tweet-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;max-width:470px;color:var(--sub);font-size:14px}
  .action{display:flex;align-items:center;gap:6px}
  .fold{display:none;margin-top:12px;border:1px solid #dbe7f5;background:#fff;border-radius:18px;overflow:hidden}
  .tweet.open .fold{display:block}
  .fold-html{padding:16px;background:#fff;line-height:1.6;overflow:auto}
  .fold-html img{max-width:100%;height:auto}
  .empty-state{padding:40px 24px;text-align:center;color:var(--sub);font-size:15px}
</style>
</head>
<body>
<div class="app">
  <aside class="left">
    <div class="brand">⌂</div>
    <button class="all-filter active" id="exportAllFilter" type="button">전체</button>
    <div class="char-list" id="exportCharList">${charMarkup}</div>
  </aside>
  <main class="center">
    <div class="topbar" id="exportTopbar">프로필 · 전체</div>
    <section class="timeline" id="exportTimeline">${postsMarkup}</section>
  </main>
</div>
<template id="app-data">${dataJson}</template>
<script>
const exportAllFilter=document.getElementById('exportAllFilter');
const exportTopbar=document.getElementById('exportTopbar');
const exportTimeline=document.getElementById('exportTimeline');
const allTweets=Array.from(exportTimeline.querySelectorAll('.tweet'));
const charButtons=Array.from(document.querySelectorAll('[data-export-filter]'));
function applyFilter(categoryId, categoryName){
  exportAllFilter.classList.toggle('active', categoryId==='all');
  charButtons.forEach(btn=>btn.closest('.char-item').classList.toggle('active', btn.dataset.exportFilter===categoryId));
  exportTopbar.textContent = categoryId==='all' ? '프로필 · 전체' : '프로필 · ' + categoryName;
  let visible=0;
  allTweets.forEach(tweet=>{
    const match = categoryId==='all' || tweet.dataset.categoryId===categoryId;
    tweet.style.display = match ? '' : 'none';
    tweet.classList.remove('open');
    if(match && visible===0){ tweet.classList.add('open'); visible++; }
  });
  const empty=document.getElementById('exportEmptyState');
  if(empty) empty.style.display = visible===0 ? '' : 'none';
}
exportAllFilter.addEventListener('click', ()=>applyFilter('all','전체'));
charButtons.forEach(btn=>btn.addEventListener('click', ()=>applyFilter(btn.dataset.exportFilter, btn.dataset.exportName)));
allTweets.forEach(tweet=>tweet.addEventListener('click', ()=>tweet.classList.toggle('open')));
applyFilter('all','전체');
` + closeScript + `
</body>
</html>`;
}
function saveHtml(){
  const blob = new Blob([makeExportHtml()], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'folded-output-export.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
function loadFromPayload(payload){
  if(!payload || !Array.isArray(payload.characters) || !Array.isArray(payload.posts)) throw new Error('불러올 수 있는 편집 데이터가 없는 HTML입니다.');
  charSeq = Number(payload.charSeq) || payload.characters.length || 1;
  characters = payload.characters.map((c, i) => ({id: c.id || `char${i+1}`, name: String(c.name ?? '')}));
  posts = payload.posts.map(p => ({
    categoryId: String(p.categoryId ?? ''),
    categoryName: String(p.categoryName ?? ''),
    author: String(p.author ?? ''),
    userId: String(p.userId ?? ''),
    time: String(p.time ?? ''),
    title: String(p.title ?? ''),
    html: String(p.html ?? '')
  }));
  activeCategoryId = 'all';
  renderCategorySelect();
  renderCharacters();
  renderPosts();
}
function loadHtmlFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const doc = new DOMParser().parseFromString(String(reader.result || ''), 'text/html');
      const dataEl = doc.getElementById('app-data');
      if(!dataEl) throw new Error('불러올 수 있는 편집 데이터가 없는 HTML입니다.');
      loadFromPayload(JSON.parse(dataEl.textContent || '{}'));
    }catch(err){
      alert(err.message || 'HTML 불러오기에 실패했습니다.');
    }finally{
      loadFileInput.value = '';
    }
  };
  reader.readAsText(file, 'utf-8');
}

allFilterBtn.addEventListener('click', ()=>{ activeCategoryId='all'; renderCharacters(); renderPosts(); });
addBtn.addEventListener('click', ()=>{
  const categoryId = categorySelect.value.trim();
  const categoryName = getCategoryNameById(categoryId);
  const title = titleText.value.trim();
  const html = htmlText.value.trim();
  if(!categoryId || !categoryName){ alert('카테고리를 선택해주세요.'); return; }
  if(!title || !html){ alert('제목과 HTML을 모두 입력해주세요.'); return; }
  posts.unshift({categoryId, categoryName, author: authorName.value.trim(), userId: userId.value.trim(), time: timeText.value.trim(), title, html});
  activeCategoryId = categoryId;
  renderCharacters();
  renderPosts();
});
sampleBtn.addEventListener('click', ()=>{
  renderCategorySelect();
  categorySelect.value = validCharacters()[0] ? validCharacters()[0].id : '';
  authorName.value = '';
  userId.value = '@AERRCEHAM_12';
  timeText.value = '';
  titleText.value = '말도안되는 걸로 밸런스게임하는 두 사람 !출력';
  htmlText.value = defaultHtml;
});
resetBtn.addEventListener('click', ()=>{
  authorName.value = '';
  userId.value = '';
  timeText.value = '';
  titleText.value = '';
  htmlText.value = '';
  renderCategorySelect();
});
saveBtn.addEventListener('click', saveHtml);
loadBtn.addEventListener('click', ()=>loadFileInput.click());
loadFileInput.addEventListener('change', ()=>{ const file = loadFileInput.files && loadFileInput.files[0]; if(file) loadHtmlFile(file); });
focusEditorBtn.addEventListener('click', ()=>categorySelect.focus());
addCharBtn.addEventListener('click', ()=>{
  charSeq += 1;
  characters.push({id:`char${charSeq}`, name:`캐릭터 ${charSeq}`});
  renderCategorySelect();
  renderCharacters();
});
collapsePanelBtn.addEventListener('click', ()=>app.classList.add('panel-collapsed'));
expandPanelBtn.addEventListener('click', ()=>app.classList.remove('panel-collapsed'));

renderCategorySelect();
renderCharacters();
renderPosts();
</script>
</body>
</html>
